<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIRS Visitor Pass Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Raleway:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{ box-sizing:border-box; margin:0; padding:0; }

:root{
  --G:    #0B3D2E;
  --G2:   #0f5238;
  --G3:   #1a6b2f;
  --GOLD: #B8963A;
  --GOLD2:#d4b05a;
  --RED:  #7A0000;
}

body{
  font-family:'Montserrat',sans-serif;
  background: linear-gradient(160deg,#111 0%,#1c2b1c 100%);
  min-height:100vh;
  padding:28px 16px;
}

.shell{ max-width:760px; margin:0 auto; }

/* ── TOP BAR ── */
.topbar{
  display:flex; align-items:center; gap:16px;
  background:linear-gradient(135deg, var(--G) 0%, var(--G2) 100%);
  border-radius:12px 12px 0 0;
  padding:18px 24px;
  border-bottom:4px solid var(--GOLD);
}
.topbar img{ width:52px; height:52px; object-fit:contain; }
.topbar-txt h1{
  font-family:'Raleway',sans-serif;
  font-size:1rem; font-weight:900;
  letter-spacing:2px; text-transform:uppercase; color:#fff;
}
.topbar-txt p{ font-size:0.65rem; color:var(--GOLD2); letter-spacing:1.5px; text-transform:uppercase; margin-top:3px; }

/* ── CONTROLS ── */
.ctrl{
  background:#0e0e0e; border:1px solid #222;
  border-radius:0 0 12px 12px;
  padding:24px; margin-bottom:32px;
}
.ctrl-title{
  font-size:0.62rem; font-weight:800;
  letter-spacing:3px; text-transform:uppercase;
  color:var(--GOLD); margin-bottom:16px;
}
.frow{ display:flex; gap:14px; flex-wrap:wrap; }
.fg{ flex:1; min-width:190px; }
.fg label{
  display:block; font-size:0.62rem; font-weight:700;
  letter-spacing:2px; text-transform:uppercase;
  color:#666; margin-bottom:7px;
}
.fg select,.fg input{
  width:100%; padding:11px 14px;
  background:#181818; border:1px solid #2e2e2e;
  border-radius:6px; color:#eee;
  font-family:'Montserrat',sans-serif; font-size:0.83rem;
  outline:none; transition:border-color 0.2s;
}
.fg select:focus,.fg input:focus{ border-color:var(--GOLD); }
.fg select option{ background:#181818; }


.btn-gen{
  width:100%; margin-top:16px; padding:14px;
  background:linear-gradient(135deg,var(--G),var(--G2));
  color:#fff; border:none; border-radius:6px;
  font-family:'Raleway',sans-serif;
  font-size:0.88rem; font-weight:900;
  letter-spacing:3px; text-transform:uppercase;
  cursor:pointer; border-bottom:3px solid var(--GOLD);
  transition:opacity 0.2s,transform 0.1s;
}
.btn-gen:hover{ opacity:0.87; }
.btn-gen:active{ transform:scale(0.99); }

/* ── PREVIEW ── */
.pview{ display:none; }
.pview.on{ display:block; }
.pview-lbl{
  text-align:center; font-size:0.6rem; font-weight:700;
  letter-spacing:3px; text-transform:uppercase;
  color:#444; margin-bottom:20px;
}

/* Front + Back side by side */
.cards-row{
  display:flex; gap:36px;
  justify-content:center; flex-wrap:wrap;
  margin-bottom:24px;
}
.cwrap{
  display:flex; flex-direction:column;
  align-items:center; gap:8px;
}
.slbl{
  font-size:0.6rem; font-weight:700;
  letter-spacing:2px; text-transform:uppercase;
  color:#555;
}

/* lanyard */
.tag-outer{
  display:flex; flex-direction:column;
  align-items:center; gap:0;
}
.lanyard-top{
  width:44px; height:18px;
  background:linear-gradient(135deg,var(--G),var(--G2));
  border-radius:6px 6px 0 0;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 -3px 10px rgba(0,0,0,0.4);
}
.lanyard-hole{
  width:11px; height:11px;
  border-radius:50%;
  background:#0e0e0e;
  border:2px solid var(--GOLD);
  box-shadow:inset 0 1px 2px rgba(0,0,0,0.6);
}

/* ════════════════════════════
   FRONT CARD  (portrait)
════════════════════════════ */
.tag-card{
  width:204px;
  height:323px;
  min-height:unset;
  border-radius:0 0 8px 8px;
  overflow:hidden;
  position:relative;
  box-shadow:0 16px 50px rgba(0,0,0,0.6), 0 4px 16px rgba(0,0,0,0.4);
  display:flex; flex-direction:column;
  background:#fff;
  border:2px solid #bbb;
  border-top:none;
  font-family:'Montserrat',sans-serif;
}
.tag-card::before{
  content:'';
  position:absolute;
  top:0; left:0; right:0; height:4px;
  background:linear-gradient(90deg, var(--GOLD), #f0d878, var(--GOLD));
  z-index:10;
}

/* Watermark */
.wm{
  position:absolute; inset:0;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(5,1fr);
  pointer-events:none; z-index:1; opacity:0.05;
}
.wmc{
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px;
}
.wmc img{ width:36px; height:36px; object-fit:contain; }
.wmc span{ font-size:6px; font-weight:800; color:var(--G); letter-spacing:1px; }

/* Header band — logo pushed down with extra top padding */
.tc-header{
  position:relative; z-index:3;
  background:linear-gradient(135deg, var(--G) 0%, var(--G2) 100%);
  padding:18px 10px 6px;   /* logo pushed down for ID card holder */
  display:flex; flex-direction:column;
  align-items:center; gap:3px;
  flex-shrink:0;
}
.tc-header-logo{
  width:36px; height:36px; object-fit:contain;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4));
}
.tc-header-name{
  font-family:'Raleway',sans-serif;
  font-size:0.42rem; font-weight:900;
  letter-spacing:1px; text-transform:uppercase;
  color:#fff; text-align:center; line-height:1.3;
}
.tc-header-sub{
  font-size:0.38rem; font-weight:600;
  letter-spacing:1.5px; text-transform:uppercase;
  color:var(--GOLD2);
}

.tc-gold-bar{
  height:3px; flex-shrink:0;
  background:linear-gradient(90deg, var(--G), var(--GOLD), var(--G));
}

.tc-body{
  position:relative; z-index:2;
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:8px 12px 6px;
  gap:5px;
}

.tc-badge{
  color:#fff;
  font-family:'Raleway',sans-serif;
  font-size:0.85rem; font-weight:900;
  letter-spacing:3px; text-transform:uppercase;
  padding:5px 10px;
  border-radius:4px;
  text-align:center;
  width:100%;
  box-shadow:0 2px 8px rgba(0,0,0,0.25);
  position:relative;
}
.tc-badge::before,.tc-badge::after{
  content:'◆'; font-size:0.6rem;
  color:var(--GOLD2);
  position:absolute; top:50%; transform:translateY(-50%);
  opacity:0.8;
}
.tc-badge::before{ left:10px; }
.tc-badge::after{ right:10px; }

.tc-divider{
  width:85%; height:1.5px;
  background:linear-gradient(90deg,transparent,var(--GOLD),transparent);
}
.tc-dept-label{
  font-size:0.36rem; font-weight:800;
  letter-spacing:2px; text-transform:uppercase; color:#999;
}
.tc-dept-name{
  font-family:'Raleway',sans-serif;
  font-size:0.52rem; font-weight:800;
  color:var(--G); text-transform:uppercase;
  letter-spacing:0.5px; text-align:center;
  line-height:1.3; padding:0 6px;
}
.tc-divider2{
  width:60%; height:1px;
  background:linear-gradient(90deg,transparent,#ccc,transparent);
}
.tc-tag-label{
  font-size:0.32rem; font-weight:800;
  letter-spacing:2px; text-transform:uppercase; color:#aaa;
}
.tc-tag-num{
  font-family:'Raleway',sans-serif;
  font-size:1.8rem; font-weight:900;
  color:#111; letter-spacing:4px;
  line-height:1; text-align:center;
}
.tc-sig-area{
  display:flex; flex-direction:column;
  align-items:center; gap:0;
  width:100%; margin-top:4px;
}

.tc-return{
  position:relative; z-index:3;
  background:linear-gradient(135deg,var(--G),var(--G2));
  padding:4px 10px;
  display:flex; align-items:center; justify-content:center;
  gap:6px; flex-shrink:0;
}
.tc-return-text{
  font-family:'Raleway',sans-serif;
  font-size:0.4rem; font-weight:900;
  letter-spacing:2px; text-transform:uppercase; color:#fff;
}
.tc-return-dot{ color:var(--GOLD); font-size:0.5rem; }

.tc-footer{
  position:relative; z-index:3;
  background:var(--G);
  padding:4px 10px;
  display:flex; align-items:center;
  justify-content:space-between; flex-shrink:0;
  border-top:2px solid var(--GOLD);
}
.tc-footer-item{
  display:flex; align-items:center; gap:4px;
  color:rgba(255,255,255,0.8); font-size:0.32rem; font-weight:600;
}
.tc-footer-icon{ color:var(--GOLD); font-size:0.58rem; }
.tc-footer-type{
  font-family:'Raleway',sans-serif;
  font-size:0.36rem; font-weight:900;
  letter-spacing:1.5px; color:var(--GOLD);
}

/* ════════════════════════════
   BACK CARD  (portrait, same size)
════════════════════════════ */
.back-card{
  width:204px;
  height:323px;
  min-height:unset;
  border-radius:8px;
  overflow:hidden;
  position:relative;
  box-shadow:0 16px 50px rgba(0,0,0,0.6), 0 4px 16px rgba(0,0,0,0.4);
  display:flex; flex-direction:column;
  background:#fff;
  border:2px solid #bbb;
  font-family:'Montserrat',sans-serif;
}
.back-card::before{
  content:'';
  position:absolute;
  top:0; left:0; right:0; height:4px;
  background:linear-gradient(90deg, var(--GOLD), #f0d878, var(--GOLD));
  z-index:10;
}

/* Back watermark (reuses .wm / .wmc) */

.bc-top{
  background:linear-gradient(135deg, var(--G) 0%, var(--G2) 100%);
  height:36px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  padding:0 10px;
  position:relative; z-index:3;
}
.bc-top-title{
  color:#fff;
  font-family:'Raleway',sans-serif;
  font-size:0.38rem; font-weight:900;
  letter-spacing:1px; text-transform:uppercase;
  text-align:center; line-height:1.3;
}

.bc-gold-bar{
  height:3px; flex-shrink:0;
  background:linear-gradient(90deg, var(--G), var(--GOLD), var(--G));
}

.bc-mid{
  flex:1; position:relative; z-index:2;
  display:flex; align-items:stretch;
}
.bc-strip{
  width:7px; flex-shrink:0;
  background:linear-gradient(180deg, var(--GOLD) 0%, var(--GOLD2) 100%);
}
.bc-content{
  flex:1; display:flex; align-items:center;
  padding:10px 10px; gap:10px;
}
.bc-logo-col{
  display:flex; flex-direction:column;
  align-items:center; gap:8px; flex-shrink:0;
}
.bc-logo{ width:40px; height:40px; object-fit:contain; }
.bc-tagnumber{
  font-family:'Raleway',sans-serif;
  font-size:0.8rem; font-weight:900;
  color:#111; letter-spacing:1.5px; text-align:center;
}
.bc-vdivider{
  width:1px; background:#ddd;
  align-self:stretch; margin:4px 0; flex-shrink:0;
}
.bc-text-col{
  flex:1; display:flex; flex-direction:column;
  justify-content:center; gap:10px;
}
.bc-proptext{
  font-size:0.36rem; color:#444;
  line-height:1.6; text-align:center;
}
.bc-proptext strong{
  display:block; color:var(--G);
  font-size:0.38rem; font-weight:800;
  margin-bottom:2px; line-height:1.3;
}

.bc-rules{
  display:flex; flex-direction:column; gap:3px;
  padding:0 4px;
}
.bc-rule{
  display:flex; align-items:flex-start; gap:4px;
  font-size:0.32rem; color:#555; line-height:1.5;
}
.bc-rule-dot{
  color:var(--GOLD); font-size:0.5rem; flex-shrink:0; margin-top:2px;
}

.bc-bot{
  height:22px; flex-shrink:0;
  background:linear-gradient(135deg, var(--G) 0%, var(--G2) 100%);
  display:flex; align-items:center;
  justify-content:space-between;
  padding:0 10px;
  position:relative; z-index:3;
  border-top:2px solid var(--GOLD);
}
.bc-bot-item{
  display:flex; align-items:center; gap:4px;
  color:rgba(255,255,255,0.85); font-size:0.32rem; font-weight:600;
}
.bc-bot-icon{ color:var(--GOLD); font-size:0.58rem; }

/* ── ACTIONS ── */
.actions{
  display:flex; gap:14px;
  justify-content:center; flex-wrap:wrap;
  margin-top:4px;
}
.btn-act{
  padding:12px 24px; border:none; border-radius:6px;
  font-family:'Raleway',sans-serif;
  font-size:0.82rem; font-weight:800;
  letter-spacing:2px; text-transform:uppercase;
  cursor:pointer; display:flex; align-items:center; gap:8px;
  transition:opacity 0.2s,transform 0.1s;
}
.btn-act:hover{ opacity:0.85; }
.btn-act:active{ transform:scale(0.97); }
.btn-dl{ background:var(--G); color:#fff; border-bottom:3px solid var(--GOLD); }
.btn-pr{ background:#1a1a1a; color:#fff; border:1px solid #333; }

@media(max-width:480px){
  .tag-card,.back-card{ width:88vw; height:auto; min-height:unset; }
  .tc-tag-num{ font-size:1.4rem; }
  .tc-badge{ font-size:0.7rem; letter-spacing:2px; }
  .tc-dept-name{ font-size:0.45rem; }
}

@media print{
  body{ background:#fff; padding:0; }
  .topbar,.ctrl,.actions,.pview-lbl,.slbl{ display:none!important; }
  .cards-row{ gap:10px; justify-content:center; }
  .tag-card,.back-card{ box-shadow:none; }
  .lanyard-top{ display:none; }
}
</style>
</head>

<div class="shell">

  <div class="topbar">
    <img id="topbar-logo" src="" alt="KIRS" style="display:none">
    <div class="topbar-txt">
      <h1>KIRS Visitor Pass Generator</h1>
      <p>Kano State Internal Revenue Service — Official Access Tag</p>
    </div>
  </div>

  <div class="ctrl">
    <div class="ctrl-title">Configure Visitor Tag</div>

    <div class="frow">
      <div class="fg">
        <label for="dept">Department / Unit</label>
        <select id="dept">
          <option value="">— Select Department —</option>
          <option>Executive Chairman</option>
          <option>Executive Director Corporate Service Group</option>
          <option>Executive Director Revenue Operation Group</option>
          <option>Executive Director Finance &amp; Revenue Account Group</option>
          <option>Assessment Department</option>
          <option>PAYE Department</option>
          <option>Government Business Department</option>
          <option>Human Resource Department</option>
          <option>Corporate Service Department</option>
          <option>Legal Services Department</option>
          <option>Planning, Research &amp; Statistics</option>
          <option>ICT Unit</option>
          <option>Headquarter Tax Office</option>
          <option>Motor Licence Office</option>
        </select>
      </div>
      <div class="fg">
        <label for="tagno">Tag Number</label>
        <input type="text" id="tagno" placeholder="e.g. 0001 or ICT-01" maxlength="20">
      </div>
    </div>
    <button class="btn-gen" onclick="generate()">⚡ Generate Visitor Tag</button>
  </div>

  <div class="pview" id="pview">
    <div class="pview-lbl">— Preview —</div>
    <div class="cards-row" id="cardsRow"></div>
    <div class="actions">
      <button class="btn-act btn-dl" onclick="dlBoth()">⬇ Download Front &amp; Back</button>
      <button class="btn-act btn-pr" onclick="window.print()">🖨 Print</button>
    </div>
  </div>

</div>

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('topbar-logo').src = LOGO;
  document.getElementById('topbar-logo').style.display = '';
});

/* ── HELPERS ── */
function fmt(v){ return v.toUpperCase().trim(); }
document.getElementById('tagno').addEventListener('input', function(){ this.value = fmt(this.value); });

function wm(){
  let h = '';
  const src = LOGO || '';
  for(let i=0;i<15;i++) h += `<div class="wmc"><img data-role="logo" src="${src}" alt=""><span>KIRS</span></div>`;
  return `<div class="wm">${h}</div>`;
}

/* ── FRONT CARD ── */
function frontCard(dept, tag, badge){
  const src = LOGO || '';
  return `
  <div class="tag-card" id="tag-front">
    ${wm()}
    <div class="tc-header">
      <img class="tc-header-logo" data-role="logo" src="${src}" alt="KIRS">
      <div class="tc-header-name">Kano State Internal Revenue Service</div>
      <div class="tc-header-sub">( KIRS )</div>
    </div>
    <div class="tc-gold-bar"></div>
    <div class="tc-body">
      <div class="tc-badge" style="background:${badge}">VISITOR PASS</div>
      <div class="tc-divider"></div>
      <div class="tc-dept-label">Department</div>
      <div class="tc-dept-name">${dept}</div>
      <div class="tc-divider2"></div>
      <div class="tc-tag-label">Tag No.</div>
      <div class="tc-tag-num">${tag}</div>
      <div class="tc-sig-area"></div>
    </div>
    <div class="tc-return">
      <span class="tc-return-dot">◆</span>
      <span class="tc-return-text">Return After Use</span>
      <span class="tc-return-dot">◆</span>
    </div>
    <div class="tc-footer">
      <div class="tc-footer-item"><span class="tc-footer-icon">✉</span> info@kirs.gov.ng</div>
      <span class="tc-footer-type">VISITOR</span>
      <div class="tc-footer-item"><span class="tc-footer-icon">🌐</span> www.kirs.gov.ng</div>
    </div>
  </div>`;
}

/* ── BACK CARD ── */
function backCard(dept, tag, badge){
  const src = LOGO || '';
  return `
  <div class="back-card" id="tag-back">
    ${wm()}
    <div class="bc-top">
      <div class="bc-top-title">Kano State Internal Revenue Service (KIRS)</div>
    </div>
    <div class="bc-gold-bar"></div>
    <div class="bc-mid">
      <div class="bc-strip"></div>
      <div class="bc-content">
        <div class="bc-logo-col">
          <img class="bc-logo" data-role="logo" src="${src}" alt="KIRS">
          <div class="bc-tagnumber">${tag}</div>
        </div>
        <div class="bc-vdivider"></div>
        <div class="bc-text-col">
          <div class="bc-proptext">
            This pass is the property of<br>
            <strong>Kano State Internal Revenue Service (KIRS).</strong>
            Unauthorized use is strictly prohibited.
            If found, return to nearest KIRS office.
          </div>
          <div class="bc-rules">
            <div class="bc-rule"><span class="bc-rule-dot">◆</span> Visitor must be accompanied by staff at all times.</div>
            <div class="bc-rule"><span class="bc-rule-dot">◆</span> Pass must be worn visibly while on KIRS premises.</div>
            <div class="bc-rule"><span class="bc-rule-dot">◆</span> Pass is valid for the date of issue only.</div>
          </div>
        </div>
      </div>
    </div>
    <div class="bc-bot">
      <div class="bc-bot-item"><span class="bc-bot-icon">✉</span> info@kirs.gov.ng</div>
      <div class="bc-bot-item"><span class="bc-bot-icon">🌐</span> www.kirs.gov.ng</div>
    </div>
  </div>`;
}

/* ── GENERATE ── */
function generate(){
  const dept  = document.getElementById('dept').value;
  const tag   = fmt(document.getElementById('tagno').value);
  if(!dept){ alert('Please select a department.'); return; }
  if(!tag) { alert('Please enter a tag number.'); return; }
  const badge = DEPTS[dept] || '#0B3D2E';

  document.getElementById('cardsRow').innerHTML = `
    <div class="cwrap">
      <span class="slbl">Front</span>
      <div class="tag-outer">
        <div class="lanyard-top"><div class="lanyard-hole"></div></div>
        ${frontCard(dept, tag, badge)}
      </div>
    </div>
    <div class="cwrap">
      <span class="slbl">Back</span>
      ${backCard(dept, tag, badge)}
    </div>`;

  const pv = document.getElementById('pview');
  pv.classList.add('on');
  pv.scrollIntoView({ behavior:'smooth', block:'start' });
}

/* ── CAPTURE ── */
async function cap(id){
  const el = document.getElementById(id);
  if(!el) return null;
  try{
    return await html2canvas(el,{
      scale:3, useCORS:false, allowTaint:false,
      backgroundColor:'#ffffff', logging:false,
      imageTimeout:0, removeContainer:true
    });
  } catch(e){ console.warn('cap error:', e); return null; }
}

/* ── DOWNLOAD BOTH ── */
async function dlBoth(){
  const btn = document.querySelector('.btn-dl');
  btn.innerHTML = '⏳ Generating…'; btn.disabled = true;
  try{
    const [fc, bc] = await Promise.all([cap('tag-front'), cap('tag-back')]);
    if(!fc || !bc){ alert('Please generate a tag first.'); return; }

    const gap = 32;
    const c   = document.createElement('canvas');
    c.width   = fc.width + bc.width + gap * 3;
    c.height  = Math.max(fc.height, bc.height) + gap * 2;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, c.width, c.height);
    ctx.drawImage(fc, gap, gap);
    ctx.drawImage(bc, fc.width + gap * 2, gap);

    const tag = fmt(document.getElementById('tagno').value) || 'pass';
    const a   = document.createElement('a');
    a.download = `KIRS_Visitor_Tag_${tag}.png`;
    a.href     = c.toDataURL('image/png');
    document.body.appendChild(a);
    a.click();
    setTimeout(() => document.body.removeChild(a), 200);
  } catch(err){
    console.error('Download error:', err);
    alert('Download failed: ' + err.message + '\nTry the Print button instead.');
  } finally{
    btn.innerHTML = '⬇ Download Front &amp; Back'; btn.disabled = false;
  }
}
</script>
