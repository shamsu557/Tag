<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KIRS Visitor ID Card Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"><\/script>
<style>
:root {
  --green:      #1a7a1a;
  --green-dark: #145214;
  --card-w:     340px;
  --card-h:     214px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Roboto', sans-serif;
  background: linear-gradient(135deg, #d4e8d4, #e8f0e8);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 24px 16px 60px;
}

/* APP HEADER */
.app-header { display:flex; flex-direction:column; align-items:center; gap:4px; margin-bottom:24px; }
.hdr-row    { display:flex; align-items:center; gap:12px; }
.hdr-logo   { width:58px; height:58px; border-radius:50%; object-fit:cover;
              border:3px solid var(--green-dark); box-shadow:0 2px 8px rgba(0,0,0,.25); }
.app-header h1 { font-family:'Oswald',sans-serif; font-size:1.2rem; color:var(--green-dark); letter-spacing:1px; line-height:1.25; }
.app-header p  { font-size:.72rem; color:#555; letter-spacing:.4px; }

/* PANEL */
.panel { background:#fff; border-radius:12px; padding:22px 20px; width:100%; max-width:400px;
         box-shadow:0 4px 20px rgba(0,0,0,.1); margin-bottom:28px; }
.panel h2 { font-family:'Oswald',sans-serif; font-size:.9rem; color:var(--green-dark);
            letter-spacing:1px; text-transform:uppercase;
            border-bottom:2px solid var(--green); padding-bottom:7px; margin-bottom:16px; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:.72rem; font-weight:700; color:#444;
               text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; }
.field select, .field input {
  width:100%; padding:9px 11px; border:1.5px solid #ccc; border-radius:7px;
  font-size:.875rem; font-family:'Roboto',sans-serif; color:#222;
  background:#fafafa; outline:none; transition:border-color .2s; }
.field select:focus, .field input:focus { border-color:var(--green); background:#fff; }

.btn-row { display:flex; gap:9px; margin-top:4px; }
.btn { flex:1; padding:10px 8px; border:none; border-radius:7px;
       font-family:'Oswald',sans-serif; font-size:.9rem; letter-spacing:1px;
       cursor:pointer; transition:transform .1s, filter .2s; }
.btn:active { transform:scale(.97); }
.btn-generate { background:var(--green); color:#fff; }
.btn-generate:hover { filter:brightness(.88); }
.btn-download { background:#2c5f8a; color:#fff; font-size:.78rem; }
.btn-download:hover { filter:brightness(.88); }
.btn-print { background:#555; color:#fff; font-size:.78rem; }
.btn-print:hover { filter:brightness(.85); }

/* CARD CONTAINER */
#card-container { display:none; flex-direction:column; align-items:center; gap:16px; }
#card-container.visible { display:flex; }
#cards-row { display:flex; flex-direction:column; align-items:center; gap:14px; }

/* SHARED CARD SHELL */
.id-card, .id-card-back {
  width:var(--card-w); height:var(--card-h);
  border-radius:10px; position:relative; overflow:hidden;
  box-shadow:0 6px 24px rgba(0,0,0,.22); background:#fff; }

/* TILED WATERMARK */
.card-watermark {
  position:absolute; inset:0; z-index:1;
  pointer-events:none; user-select:none;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(3,1fr);
  align-items:center; justify-items:center; padding:4px; }
.card-watermark img { width:50px; height:50px; object-fit:contain; opacity:.07; border-radius:50%; }

/* FRONT — DEPT ACCENT BAR */
.dept-accent { position:absolute; left:0; top:36px; width:5px; height:calc(100% - 36px); z-index:4; }

/* FRONT — HEADER: logo + org name on same row, org name centered */
.card-header {
  background:var(--green); width:100%; height:36px;
  padding:0 10px;
  display:flex; flex-direction:row; align-items:center; gap:8px;
  position:relative; z-index:3; }
.card-header .logo-wrap {
  width:26px; height:26px; border-radius:50%; overflow:hidden;
  flex-shrink:0; border:1.5px solid #fff; background:#fff; }
.card-header .logo-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
.card-header .org-name {
  flex:1; text-align:center;
  font-family:'Oswald',sans-serif; font-size:.58rem; color:#fff;
  letter-spacing:.7px; line-height:1.25; font-weight:600; text-transform:uppercase; }

/* VISITOR PASS badge — colour set per dept */
.visitor-badge {
  position:absolute; top:40px; left:50%; transform:translateX(-50%);
  color:#fff; font-family:'Oswald',sans-serif; font-size:.82rem; font-weight:700;
  letter-spacing:2.5px; padding:3px 20px; border-radius:2px;
  z-index:4; white-space:nowrap; background:#c0392b; }

/* CARD BODY */
.card-body {
  position:absolute; top:68px; left:0; right:0; bottom:40px;
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:5px; padding:4px 16px; z-index:2; }
.dept-name {
  font-family:'Oswald',sans-serif; font-size:.7rem; color:var(--green-dark);
  letter-spacing:.4px; text-transform:uppercase; text-align:center;
  font-weight:600; line-height:1.3; max-width:92%; }
.divider-line { width:55%; height:1px;
  background:linear-gradient(to right,transparent,#bbb,transparent); margin:2px 0; }
.tag-value { font-family:'Oswald',sans-serif; font-size:1.3rem; font-weight:700; color:#111; letter-spacing:2px; }

/* RETURN AFTER USE — just above footer bar, on card body */
.return-label {
  position:absolute; bottom:27px; left:0; right:0; text-align:center; z-index:3;
  font-family:'Oswald',sans-serif; font-size:.52rem; color:#555;
  letter-spacing:1.8px; font-weight:700; text-transform:uppercase; }

/* FRONT FOOTER */
.card-footer {
  position:absolute; bottom:0; left:0; right:0; height:25px;
  background:var(--green);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 10px; z-index:3; }
.card-footer span { font-size:.52rem; color:rgba(255,255,255,.85); letter-spacing:.4px; }

/* BACK CARD */
.id-card-back { display:flex; flex-direction:column; }
.back-top-bar {
  background:var(--green); padding:5px 10px; flex-shrink:0;
  font-family:'Oswald',sans-serif; font-size:.58rem; color:#fff;
  letter-spacing:1px; text-transform:uppercase; text-align:center;
  position:relative; z-index:3; }
.back-body {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:8px 16px; gap:5px; position:relative; }
.back-logo-wrap { width:34px; height:34px; border-radius:50%; overflow:hidden;
                  border:2px solid var(--green); flex-shrink:0; z-index:2; }
.back-logo-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
.back-tag-display { font-family:'Oswald',sans-serif; font-size:1rem;
  font-weight:700; color:var(--green-dark); letter-spacing:2px; z-index:2; }
.back-note { font-size:.57rem; color:#444; text-align:center; line-height:1.55; z-index:2; max-width:90%; }
.back-note strong { color:var(--green-dark); }
.back-sig-line { width:80px; height:1px; background:#333; margin-top:3px; z-index:2; }
.back-sig-label { font-size:.5rem; color:#666; letter-spacing:.5px; text-transform:uppercase; z-index:2; }
.back-footer {
  background:var(--green); padding:4px 10px; flex-shrink:0;
  display:flex; justify-content:space-between; align-items:center;
  position:relative; z-index:3; }
.back-footer span { font-size:.5rem; color:rgba(255,255,255,.85); letter-spacing:.3px; }

/* ACTION BUTTONS */
.action-btns { display:flex; gap:9px; width:var(--card-w); }
.action-btns .btn { font-size:.75rem; padding:9px 8px; }

@media (max-width:360px) {
  :root { --card-w:300px; --card-h:189px; }
  .tag-value { font-size:1rem; }
  .visitor-badge { font-size:.72rem; }
}
@media print {
  body { background:#fff; padding:0; }
  .panel, .app-header, .action-btns { display:none !important; }
  #card-container { display:flex !important; }
  #cards-row { flex-direction:row !important; gap:20px !important; align-items:flex-start !important; }
  .id-card, .id-card-back { box-shadow:none; border:1px solid #ccc; }
}
</style>
</head>

// Auto-uppercase tag
document.getElementById('tag-input').addEventListener('input', function() {
  var p = this.selectionStart;
  this.value = this.value.toUpperCase();
  this.setSelectionRange(p, p);
});

function buildWatermark(id) {
  var el = document.getElementById(id);
  el.innerHTML = '';
  for (var i = 0; i < 12; i++) {
    var img = document.createElement('img');
    img.src = LOGO;
    el.appendChild(img);
  }
}

function generateCard() {
  var key = document.getElementById('dept-select').value;
  var tag = document.getElementById('tag-input').value.trim().toUpperCase();
  if (!key) { alert('Please select a department.'); return; }
  if (!tag) { alert('Please enter a tag number.'); return; }

  var dept = DEPTS[key];

  document.getElementById('card-dept').textContent  = dept.label;
  document.getElementById('card-tag').textContent   = tag;
  document.getElementById('back-tag').textContent   = 'TAG: ' + tag;
  document.getElementById('visitor-badge').style.background = dept.color;
  document.getElementById('accent-bar').style.background    = dept.color;

  buildWatermark('front-wm');
  buildWatermark('back-wm');

  var c = document.getElementById('card-container');
  c.classList.add('visible');
  c.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

document.getElementById('gen-btn').addEventListener('click', generateCard);

document.getElementById('dl-btn').addEventListener('click', function() {
  var row = document.getElementById('cards-row');
  var prev = row.style.cssText;
  row.style.cssText = 'display:flex;flex-direction:row;gap:16px;align-items:flex-start;padding:12px;background:#e8f0e8;border-radius:12px;';

  html2canvas(row, {
    scale: 3, useCORS: true, allowTaint: true,
    backgroundColor: '#e8f0e8', logging: false,
    onclone: function(doc) {
      doc.getElementById('cards-row').style.cssText =
        'display:flex;flex-direction:row;gap:16px;align-items:flex-start;padding:12px;background:#e8f0e8;border-radius:12px;';
    }
  }).then(function(canvas) {
    row.style.cssText = prev;
    var tag = document.getElementById('card-tag').textContent || 'VISITOR';
    var a = document.createElement('a');
    a.download = 'KIRS_Pass_' + tag + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }).catch(function() {
    row.style.cssText = prev;
    alert('Download failed. Use Print instead.');
  });
});
</script>
</body>
</html>
