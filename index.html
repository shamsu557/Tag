<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIRS Visitor Pass Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Raleway:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{ box-sizing:border-box; margin:0; padding:0; }

:root{
  --G:  #0B3D2E;
  --G2: #0f5238;
  --GOLD: #B8963A;
  --GOLD2: #d4b05a;
  --W:  #ffffff;
  --CW: 380px;
  --CH: 240px;
}

body{
  font-family:'Montserrat',sans-serif;
  background: #1a1a1a;
  min-height:100vh;
  padding:28px 16px;
}

/* ═══ UI SHELL ═══ */
.shell{ max-width:900px; margin:0 auto; }

.topbar{
  display:flex; align-items:center; gap:16px;
  background: linear-gradient(135deg, #0B3D2E 0%, #0f5238 60%, #1a6b2f 100%);
  border-radius:12px;
  padding:20px 26px;
  margin-bottom:3px;
  position:relative;
  overflow:hidden;
}
.topbar::after{
  content:'';
  position:absolute; top:0; right:0; bottom:0;
  width:6px;
  background: var(--GOLD);
}
.topbar img{ width:56px; height:56px; object-fit:contain; filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4)); }
.topbar-txt h1{
  font-family:'Raleway',sans-serif;
  font-size:1.1rem; font-weight:800;
  letter-spacing:2.5px; text-transform:uppercase;
  color:#fff;
}
.topbar-txt p{
  font-size:0.7rem; color:var(--GOLD2);
  letter-spacing:1.5px; text-transform:uppercase; margin-top:3px;
}

.ctrlbox{
  background:#111;
  border:1px solid #2a2a2a;
  border-radius:0 0 12px 12px;
  padding:26px;
  margin-bottom:30px;
}
.ctrlbox-title{
  font-size:0.65rem; font-weight:700;
  letter-spacing:3px; text-transform:uppercase;
  color:var(--GOLD); margin-bottom:18px;
  display:flex; align-items:center; gap:8px;
}
.ctrlbox-title::before{
  content:''; display:inline-block;
  width:20px; height:2px; background:var(--GOLD);
}

.frow{ display:flex; gap:14px; flex-wrap:wrap; }
.fg{ flex:1; min-width:200px; }
.fg label{
  display:block; font-size:0.65rem; font-weight:700;
  letter-spacing:2px; text-transform:uppercase;
  color:#888; margin-bottom:8px;
}
.fg select, .fg input{
  width:100%; padding:12px 14px;
  background:#1a1a1a; border:1px solid #333;
  border-radius:6px; color:#fff;
  font-family:'Montserrat',sans-serif; font-size:0.85rem;
  outline:none; transition:border-color 0.2s;
}
.fg select:focus, .fg input:focus{ border-color:var(--GOLD); }
.fg select option{ background:#1a1a1a; }

.btn-gen{
  width:100%; margin-top:18px;
  padding:14px;
  background: linear-gradient(135deg, var(--G) 0%, var(--G2) 100%);
  color:#fff; border:none; border-radius:6px;
  font-family:'Raleway',sans-serif;
  font-size:0.9rem; font-weight:800;
  letter-spacing:3px; text-transform:uppercase;
  cursor:pointer;
  border-bottom:3px solid var(--GOLD);
  transition:opacity 0.2s, transform 0.1s;
}
.btn-gen:hover{ opacity:0.88; }
.btn-gen:active{ transform:scale(0.99); }

/* ═══ PREVIEW ═══ */
.pview{ display:none; }
.pview.on{ display:block; }
.pview-lbl{
  text-align:center; font-size:0.65rem; font-weight:700;
  letter-spacing:3px; text-transform:uppercase;
  color:#555; margin-bottom:20px;
}
.cards-row{
  display:flex; gap:32px;
  justify-content:center; flex-wrap:wrap;
  margin-bottom:24px;
}
.cwrap{
  display:flex; flex-direction:column;
  align-items:center; gap:8px;
}
.slbl{
  font-size:0.6rem; font-weight:700;
  letter-spacing:2px; text-transform:uppercase;
  color:#555;
}

/* ═══════════════════════════════
   CARD — NEW DESIGN
   Split diagonal: left green panel + right white panel
   Bold vertical VISITOR text on left
   Department + Tag on right
═══════════════════════════════ */
.card{
  width:var(--CW);
  height:var(--CH);
  border-radius:10px;
  overflow:hidden;
  position:relative;
  flex-shrink:0;
  box-shadow:0 12px 40px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.3);
  display:flex;
  flex-direction:column;
  background:#fff;
  font-family:'Montserrat',sans-serif;
}

/* ── WATERMARK ── */
.wm{
  position:absolute; inset:0;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(3,1fr);
  pointer-events:none; z-index:1; opacity:0.045;
}
.wmc{
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:1px;
}
.wmc img{ width:28px; height:28px; object-fit:contain; }
.wmc span{ font-size:5px; font-weight:800; color:var(--G); letter-spacing:1px; }

/* ── FRONT LAYOUT ── */
.f-wrap{
  position:relative; z-index:2;
  display:flex; flex:1;
  overflow:hidden;
}

/* Left green panel */
.f-left{
  width:92px; flex-shrink:0;
  background: linear-gradient(180deg, var(--G) 0%, var(--G2) 100%);
  display:flex; flex-direction:column;
  align-items:center; justify-content:space-between;
  padding:10px 0;
  position:relative;
}
/* Diagonal cut on right edge of left panel */
.f-left::after{
  content:'';
  position:absolute; top:0; right:-18px; bottom:0;
  width:36px;
  background: linear-gradient(180deg, var(--G) 0%, var(--G2) 100%);
  clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%);
  z-index:3;
}

.f-left-logo{
  width:44px; height:44px; object-fit:contain;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  position:relative; z-index:4;
}

/* Rotated VISITOR text */
.f-visitor-wrap{
  flex:1; display:flex;
  align-items:center; justify-content:center;
  position:relative; z-index:4;
}
.f-visitor{
  writing-mode:vertical-rl;
  transform:rotate(180deg);
  font-family:'Raleway',sans-serif;
  font-size:0.75rem; font-weight:900;
  letter-spacing:5px; text-transform:uppercase;
  color:rgba(255,255,255,0.18);
}

.f-left-gold{
  width:28px; height:3px;
  background:var(--GOLD);
  border-radius:2px;
  position:relative; z-index:4;
}

/* Right content panel */
.f-right{
  flex:1;
  display:flex; flex-direction:column;
  justify-content:center;
  padding:14px 16px 10px 28px;
  position:relative; z-index:2;
}

.f-pass-label{
  font-size:0.52rem; font-weight:800;
  letter-spacing:3px; text-transform:uppercase;
  color:var(--GOLD);
  margin-bottom:4px;
}

.f-badge{
  display:inline-block;
  color:#fff;
  font-family:'Raleway',sans-serif;
  font-size:0.92rem; font-weight:900;
  letter-spacing:3px; text-transform:uppercase;
  padding:4px 14px;
  border-radius:3px;
  margin-bottom:8px;
  align-self:flex-start;
}

.f-divline{
  width:100%; height:1px;
  background:linear-gradient(90deg,var(--GOLD),transparent);
  margin-bottom:7px;
}

.f-dept-name{
  font-size:0.6rem; font-weight:700;
  text-transform:uppercase;
  color:#333; letter-spacing:0.5px;
  line-height:1.4; margin-bottom:6px;
}

.f-tag-num{
  font-family:'Raleway',sans-serif;
  font-size:1.55rem; font-weight:900;
  color:#111; letter-spacing:3px;
  line-height:1;
}

.f-return{
  font-size:0.45rem; font-weight:800;
  letter-spacing:2px; text-transform:uppercase;
  color:var(--G); margin-top:6px;
  display:flex; align-items:center; gap:4px;
}
.f-rdot{ color:#C0392B; font-size:0.4rem; }

/* Bottom gold bar on front */
.f-bot{
  position:relative; z-index:5;
  height:6px;
  background:linear-gradient(90deg, var(--G), var(--G2) 50%, var(--GOLD));
  flex-shrink:0;
}

/* ── BACK CARD ── */
.b-top{
  background:linear-gradient(135deg, var(--G) 0%, var(--G2) 100%);
  height:46px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  padding:0 14px;
  position:relative; z-index:3;
}
.b-top-title{
  color:#fff;
  font-family:'Raleway',sans-serif;
  font-size:0.62rem; font-weight:800;
  letter-spacing:1.5px; text-transform:uppercase;
  text-align:center; line-height:1.3;
}

.b-mid{
  flex:1; position:relative; z-index:2;
  display:flex; align-items:stretch;
}

/* Left strip on back */
.b-strip{
  width:7px; flex-shrink:0;
  background:linear-gradient(180deg, var(--GOLD) 0%, var(--GOLD2) 100%);
}

.b-content{
  flex:1; display:flex; align-items:center;
  padding:10px 14px; gap:14px;
}

.b-logo-col{
  display:flex; flex-direction:column;
  align-items:center; gap:6px;
  flex-shrink:0;
}
.b-logo{ width:50px; height:50px; object-fit:contain; }
.b-tagnumber{
  font-family:'Raleway',sans-serif;
  font-size:1.1rem; font-weight:900;
  color:#111; letter-spacing:2px;
  text-align:center;
}

.b-vdivider{
  width:1px; background:#ddd;
  align-self:stretch; margin:4px 0;
  flex-shrink:0;
}

.b-text-col{
  flex:1; display:flex; flex-direction:column;
  justify-content:center; gap:7px;
}
.b-proptext{
  font-size:0.55rem; color:#444;
  line-height:1.6; text-align:center;
}
.b-proptext strong{
  display:block; color:var(--G);
  font-size:0.58rem; font-weight:700;
  margin-bottom:2px;
}

.b-sig{
  display:flex; flex-direction:column;
  align-items:center; gap:0;
}
.b-sig-img{
  width:100px; height:34px;
  object-fit:contain; object-position:center;
  filter:brightness(0.12);
  opacity:0.85;
}
.b-sig-line{
  width:100px; height:1px; background:#999;
}
.b-sig-lbl{
  font-size:0.46rem; font-weight:700;
  letter-spacing:1.5px; text-transform:uppercase;
  color:#999; margin-top:2px;
}

.b-bot{
  height:28px; flex-shrink:0;
  background:linear-gradient(135deg, var(--G) 0%, var(--G2) 100%);
  display:flex; align-items:center;
  justify-content:space-between;
  padding:0 14px;
  position:relative; z-index:3;
}
.b-bot-item{
  display:flex; align-items:center; gap:4px;
  color:rgba(255,255,255,0.8); font-size:0.5rem;
}
.b-bot-icon{ color:var(--GOLD); font-size:0.58rem; }

/* ═══ ACTIONS ═══ */
.actions{
  display:flex; gap:14px;
  justify-content:center; flex-wrap:wrap;
  margin-top:6px;
}
.btn-act{
  padding:12px 24px; border:none; border-radius:6px;
  font-family:'Raleway',sans-serif;
  font-size:0.82rem; font-weight:800;
  letter-spacing:2px; text-transform:uppercase;
  cursor:pointer; display:flex; align-items:center; gap:8px;
  transition:opacity 0.2s,transform 0.1s;
}
.btn-act:hover{ opacity:0.85; }
.btn-act:active{ transform:scale(0.97); }
.btn-dl{ background:var(--G); color:#fff; border-bottom:3px solid var(--GOLD); }
.btn-pr{ background:#1a1a1a; color:#fff; border:1px solid #333; }

@media(max-width:560px){
  :root{ --CW:310px; --CH:196px; }
  .f-left{ width:72px; }
  .f-badge{ font-size:0.78rem; }
  .f-tag-num{ font-size:1.2rem; }
  .f-dept-name{ font-size:0.52rem; }
  .b-logo{ width:38px; height:38px; }
  .b-tagnumber{ font-size:0.9rem; }
}

@media print{
  body{ background:#fff; padding:0; }
  .topbar,.ctrlbox,.actions,.pview-lbl,.slbl{ display:none!important; }
  .cards-row{ gap:10px; }
  .card{ box-shadow:none; }
}
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <div class="topbar">
    <img src="./1742655110029-1742653185335-kirslogo.jfif" alt="KIRS" onerror="this.style.display='none'">
    <div class="topbar-txt">
      <h1>KIRS Visitor Pass Generator</h1>
      <p>Kano State Internal Revenue Service — Official Access Control</p>
    </div>
  </div>

  <!-- Controls -->
  <div class="ctrlbox">
    <div class="ctrlbox-title">Configure Pass</div>

    <!-- Image loaders -->
    <div class="frow" style="margin-bottom:16px;">
      <div class="fg">
        <label>Logo Image (kirslogo.jfif)</label>
        <div style="display:flex;align-items:center;gap:10px;">
          <label style="
            padding:9px 16px; background:#1a1a1a; border:1px dashed #444;
            border-radius:6px; color:#aaa; cursor:pointer;
            font-size:0.75rem; font-weight:700; letter-spacing:1px;
            white-space:nowrap; text-transform:uppercase;
          ">
            📁 Choose Logo
            <input type="file" id="logoInput" accept="image/*" style="display:none">
          </label>
          <span id="logoStatus" style="font-size:0.7rem;color:#555;letter-spacing:1px;">No file chosen</span>
        </div>
      </div>
      <div class="fg">
        <label>Signature Image (optional)</label>
        <div style="display:flex;align-items:center;gap:10px;">
          <label style="
            padding:9px 16px; background:#1a1a1a; border:1px dashed #444;
            border-radius:6px; color:#aaa; cursor:pointer;
            font-size:0.75rem; font-weight:700; letter-spacing:1px;
            white-space:nowrap; text-transform:uppercase;
          ">
            📁 Choose Signature
            <input type="file" id="sigInput" accept="image/*" style="display:none">
          </label>
          <span id="sigStatus" style="font-size:0.7rem;color:#555;letter-spacing:1px;">No file chosen</span>
        </div>
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label for="dept">Department / Unit</label>
        <select id="dept">
          <option value="">— Select Department —</option>
          <option>Executive Chairman</option>
          <option>Executive Director Corporate Service Group</option>
          <option>Executive Director Revenue Operation Group</option>
          <option>Executive Director Finance &amp; Revenue Account Group</option>
          <option>Assessment Department</option>
          <option>PAYE Department</option>
          <option>Government Business Department</option>
          <option>Human Resource Department</option>
          <option>Corporate Service Department</option>
          <option>Legal Services Department</option>
          <option>Planning, Research &amp; Statistics</option>
          <option>ICT Unit</option>
          <option>Headquarter Tax Office</option>
          <option>Motor Licence Office</option>
        </select>
      </div>
      <div class="fg">
        <label for="tagno">Tag Number</label>
        <input type="text" id="tagno" placeholder="e.g. 0001 or ICT-01" maxlength="20">
      </div>
    </div>
    <button class="btn-gen" onclick="generate()">⚡ Generate Pass</button>
  </div>

  <!-- Preview -->
  <div class="pview" id="pview">
    <div class="pview-lbl">— Preview —</div>
    <div class="cards-row" id="cardsRow"></div>
    <div class="actions">
      <button class="btn-act btn-dl" onclick="dlBoth()">⬇ Download Front &amp; Back</button>
      <button class="btn-act btn-pr" onclick="window.print()">🖨 Print</button>
    </div>
  </div>

</div>

<script>
const DEPTS = {
  "Executive Chairman":                           "#7A0000",
  "Executive Director Corporate Service Group":            "#0B3D2E",
  "Executive Director Revenue Operation Group":            "#0D1F5C",
  "Executive Director Finance & Revenue Account Group":    "#7A5C00",
  "Assessment Department":                                 "#3B006F",
  "PAYE Department":                                       "#004444",
  "Government Business Department":                        "#7A3300",
  "Human Resource Department":                             "#5C003A",
  "Corporate Service Department":                          "#4A2000",
  "Legal Services Department":                             "#1F0050",
  "Planning, Research & Statistics":                       "#7A0040",
  "ICT Unit":                                              "#003A4F",
  "Headquarter Tax Office":                                "#3B1F00",
  "Motor Licence Office":                                  "#2E3800",
};

let LOGO = 'kirslogo.jfif';   // will be replaced with base64 once loaded
let SIG  = 'signature__2_-removebg-preview.png';

// Load image file → base64 data URL
function loadImgAsBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=()=>rej(r.error);
    r.readAsDataURL(file);
  });
}

// When user picks a logo file, embed it immediately
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('logoInput').addEventListener('change',async function(){
    if(!this.files[0])return;
    LOGO=await loadImgAsBase64(this.files[0]);
    // Update any already-rendered card images live
    document.querySelectorAll('img[data-role="logo"]').forEach(i=>i.src=LOGO);
    document.getElementById('logoStatus').textContent='✔ Logo loaded';
    document.getElementById('logoStatus').style.color='#4caf50';
  });
  document.getElementById('sigInput').addEventListener('change',async function(){
    if(!this.files[0])return;
    SIG=await loadImgAsBase64(this.files[0]);
    document.querySelectorAll('img[data-role="sig"]').forEach(i=>i.src=SIG);
    document.getElementById('sigStatus').textContent='✔ Signature loaded';
    document.getElementById('sigStatus').style.color='#4caf50';
  });
});

function fmt(v){ return v.toUpperCase().trim(); }
document.getElementById('tagno').addEventListener('input',function(){this.value=fmt(this.value);});

function wm(){
  let h='';
  for(let i=0;i<12;i++) h+=`<div class="wmc"><img data-role="logo" src="${LOGO}" alt=""><span>KIRS</span></div>`;
  return `<div class="wm">${h}</div>`;
}

function frontCard(dept,tag,badge){
  return `
  <div class="card" id="card-front">
    ${wm()}
    <div class="f-wrap">
      <div class="f-left">
        <img class="f-left-logo" data-role="logo" src="${LOGO}" alt="KIRS">
        <div class="f-visitor-wrap">
          <span class="f-visitor">Kano State IRS</span>
        </div>
        <div class="f-left-gold"></div>
      </div>
      <div class="f-right">
        <div class="f-pass-label">Official Access Document</div>
        <div class="f-badge" style="background:${badge}">VISITOR PASS</div>
        <div class="f-divline"></div>
        <div class="f-dept-name">${dept}</div>
        <div class="f-tag-num">${tag}</div>
        <div class="f-return">
          <span class="f-rdot">●</span> RETURN AFTER USE <span class="f-rdot">●</span>
        </div>
      </div>
    </div>
    <div class="f-bot"></div>
  </div>`;
}

function backCard(dept,tag,badge){
  return `
  <div class="card" id="card-back">
    ${wm()}
    <div class="b-top">
      <div class="b-top-title">Kano State Internal Revenue Service (KIRS)</div>
    </div>
    <div class="b-mid">
      <div class="b-strip"></div>
      <div class="b-content">
        <div class="b-logo-col">
          <img class="b-logo" data-role="logo" src="${LOGO}" alt="KIRS">
          <div class="b-tagnumber">${tag}</div>
        </div>
        <div class="b-vdivider"></div>
        <div class="b-text-col">
          <div class="b-proptext">
            This pass is the property of<br>
            <strong>Kano State Internal Revenue Service (KIRS).</strong>
            Unauthorized use is strictly prohibited.
            If found, return to nearest KIRS office.
          </div>
        </div>
      </div>
    </div>
    <div class="b-bot">
      <div class="b-bot-item"><span class="b-bot-icon">✉</span> info@kirs.gov.ng</div>
      <div class="b-bot-item"><span class="b-bot-icon">🌐</span> www.kirs.gov.ng</div>
    </div>
  </div>`;
}

function generate(){
  const dept=document.getElementById('dept').value;
  const tag=fmt(document.getElementById('tagno').value);
  if(!dept){alert('Please select a department.');return;}
  if(!tag){alert('Please enter a tag number.');return;}
  const badge=DEPTS[dept]||'#0B3D2E';
  document.getElementById('cardsRow').innerHTML=`
    <div class="cwrap"><span class="slbl">Front</span>${frontCard(dept,tag,badge)}</div>
    <div class="cwrap"><span class="slbl">Back</span>${backCard(dept,tag,badge)}</div>`;
  const pv=document.getElementById('pview');
  pv.classList.add('on');
  pv.scrollIntoView({behavior:'smooth',block:'start'});
}

async function cap(id){
  const el=document.getElementById(id);
  if(!el)return null;
  try{
    return await html2canvas(el,{
      scale:3,
      useCORS:false,
      allowTaint:false,
      backgroundColor:'#ffffff',
      logging:false,
      imageTimeout:0,
      removeContainer:true
    });
  }catch(e){
    console.warn('html2canvas error:',e);
    return null;
  }
}

async function dlBoth(){
  const btn=document.querySelector('.btn-dl');
  btn.innerHTML='⏳ Generating…'; btn.disabled=true;
  try{
    const front=document.getElementById('card-front');
    const back=document.getElementById('card-back');
    if(!front||!back){alert('Please generate a pass first.');return;}

    const[fc,bc]=await Promise.all([cap('card-front'),cap('card-back')]);
    if(!fc||!bc){alert('Could not capture the cards. Please try again.');return;}

    const gap=28;
    const c=document.createElement('canvas');
    c.width=fc.width+bc.width+gap*3;
    c.height=Math.max(fc.height,bc.height)+gap*2;
    const ctx=c.getContext('2d');
    ctx.fillStyle='#1a1a1a';
    ctx.fillRect(0,0,c.width,c.height);
    ctx.drawImage(fc,gap,gap);
    ctx.drawImage(bc,fc.width+gap*2,gap);

    const tag=fmt(document.getElementById('tagno').value)||'pass';
    const dataURL=c.toDataURL('image/png');

    // Robust download — works in all modern browsers
    const a=document.createElement('a');
    a.download=`KIRS_Visitor_Pass_${tag}.png`;
    a.href=dataURL;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>document.body.removeChild(a),200);
  }catch(err){
    console.error('Download error:',err);
    alert('Download failed: '+err.message+'\nTry using the Print button instead.');
  }finally{
    btn.innerHTML='⬇ Download Front &amp; Back'; btn.disabled=false;
  }
}
</script>
</body>
</html>
